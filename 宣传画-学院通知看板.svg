<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100" width="800" height="1100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.2"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="1100" fill="url(#bgGrad)"/>

  <!-- Decorative circles -->
  <circle cx="700" cy="100" r="200" fill="#ffffff" fill-opacity="0.05"/>
  <circle cx="100" cy="1000" r="250" fill="#ffffff" fill-opacity="0.05"/>
  <circle cx="400" cy="550" r="400" fill="#ffffff" fill-opacity="0.03"/>

  <!-- Header Banner -->
  <rect x="50" y="40" width="700" height="120" rx="16" fill="#ffffff" fill-opacity="0.1"/>
  <text x="400" y="95" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="48" font-weight="bold" fill="#ffffff">🏫 学院通知看板</text>
  <text x="400" y="135" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="20" fill="#bfdbfe">从微信群消息提取通知 · 高效管理 · 便捷查看</text>

  <!-- Main Feature Cards -->
  <!-- Card 1: Smart Parse -->
  <g transform="translate(60, 190)" filter="url(#shadow)">
    <rect width="320" height="200" rx="16" fill="#ffffff"/>
    <rect x="0" y="0" width="6" height="200" rx="3" fill="#f59e0b"/>
    <text x="30" y="45" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="28" font-weight="bold" fill="#1f2937">📋 智能解析</text>
    <text x="30" y="80" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#6b7280">自动识别通知类型</text>
    <text x="30" y="105" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#6b7280">智能提取关键信息</text>
    <text x="30" y="130" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#6b7280">一键解析微信文本</text>
    <text x="30" y="165" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="36" fill="#f59e0b" font-weight="bold">10+</text>
    <text x="90" y="165" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#6b7280">种通知类型</text>
  </g>

  <!-- Card 2: Categories -->
  <g transform="translate(420, 190)" filter="url(#shadow)">
    <rect width="320" height="200" rx="16" fill="#ffffff"/>
    <rect x="0" y="0" width="6" height="200" rx="3" fill="#3b82f6"/>
    <text x="30" y="45" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="28" font-weight="bold" fill="#1f2937">🏷️ 分类管理</text>
    <text x="30" y="80" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#6b7280">科研 / 教学 / 研究生</text>
    <text x="30" y="105" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#6b7280">学工 / 人事 / 保密</text>
    <text x="30" y="130" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#6b7280">国资 / 安全 / 国合</text>
    <text x="30" y="165" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="36" fill="#3b82f6" font-weight="bold">100%</text>
    <text x="115" y="165" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#6b7280">精准分类</text>
  </g>

  <!-- Sticky Notes Demo -->
  <g transform="translate(60, 420)">
    <text x="0" y="30" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="22" font-weight="bold" fill="#ffffff">📌 便签式看板</text>

    <!-- Sticky Note 1 -->
    <g transform="translate(0, 50)" filter="url(#shadow)">
      <rect width="180" height="160" rx="4" fill="#fff5b3"/>
      <circle cx="90" cy="20" r="8" fill="#ef4444"/>
      <text x="15" y="50" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#92400e" font-weight="bold">科研</text>
      <text x="15" y="75" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#1f2937" font-weight="bold">科技厅项目申报</text>
      <text x="15" y="100" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#6b7280">★ ★ ★</text>
      <text x="15" y="120" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#dc2626">⏰ 5月10日截止</text>
      <text x="15" y="145" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#6b7280">👤 张老师</text>
    </g>

    <!-- Sticky Note 2 -->
    <g transform="translate(200, 70)" filter="url(#shadow)">
      <rect width="180" height="160" rx="4" fill="#ffe3c2"/>
      <circle cx="90" cy="20" r="8" fill="#3b82f6"/>
      <text x="15" y="50" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#c2410c" font-weight="bold">教学</text>
      <text x="15" y="75" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#1f2937" font-weight="bold">本科毕设答辩</text>
      <text x="15" y="100" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#6b7280">★ ★</text>
      <text x="15" y="120" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#92400e">⏰ 5月15日</text>
      <text x="15" y="145" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#6b7280">👤 李老师</text>
    </g>

    <!-- Sticky Note 3 -->
    <g transform="translate(400, 40)" filter="url(#shadow)">
      <rect width="180" height="160" rx="4" fill="#d8eeff"/>
      <circle cx="90" cy="20" r="8" fill="#8b5cf6"/>
      <text x="15" y="50" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#1e40af" font-weight="bold">研究生</text>
      <text x="15" y="75" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#1f2937" font-weight="bold">导师培训通知</text>
      <text x="15" y="100" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#6b7280">★ ★ ★</text>
      <text x="15" y="120" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#059669">⏰ 明天截止</text>
      <text x="15" y="145" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#6b7280">👤 王老师</text>
    </g>

    <!-- Sticky Note 4 -->
    <g transform="translate(600, 80)" filter="url(#shadow)">
      <rect width="180" height="160" rx="4" fill="#e8ffd9"/>
      <circle cx="90" cy="20" r="8" fill="#22c55e"/>
      <text x="15" y="50" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#15803d" font-weight="bold">学工</text>
      <text x="15" y="75" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#1f2937" font-weight="bold">奖学金评选</text>
      <text x="15" y="100" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#6b7280">★</text>
      <text x="15" y="120" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#6b7280">⏰ 5月20日</text>
      <text x="15" y="145" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#6b7280">👤 赵老师</text>
    </g>
  </g>

  <!-- Feature List -->
  <g transform="translate(60, 720)">
    <rect width="680" height="240" rx="16" fill="#ffffff" fill-opacity="0.1"/>
    <text x="30" y="40" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="24" font-weight="bold" fill="#ffffff">✨ 核心功能</text>

    <g transform="translate(30, 65)">
      <text x="0" y="20" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" fill="#bfdbfe">✓ 粘贴微信群消息，自动解析分类</text>
      <text x="0" y="50" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" fill="#bfdbfe">✓ 支持附件上传，方便查看资料</text>
      <text x="0" y="80" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" fill="#bfdbfe">✓ 重要通知置顶，过期自动标记</text>
      <text x="340" y="20" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" fill="#bfdbfe">✓ 搜索筛选，快速定位通知</text>
      <text x="340" y="50" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" fill="#bfdbfe">✓ 便利贴视图，直观展示</text>
      <text x="340" y="80" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" fill="#bfdbfe">✓ 导出导入，数据备份无忧</text>
    </g>
  </g>

  <!-- QR Code Area -->
  <g transform="translate(280, 980)">
    <rect width="240" height="100" rx="12" fill="#ffffff"/>
    <text x="120" y="30" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#1f2937" font-weight="bold">访问地址</text>
    <text x="120" y="60" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="20" fill="#3b82f6" font-weight="bold">http://localhost:3000</text>
    <text x="120" y="85" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#6b7280">局域网内均可访问</text>
  </g>

  <!-- Footer -->
  <text x="400" y="1060" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#bfdbfe">南京航空航天大学 · 学院通知看板 · 2026</text>

</svg>
