name: Deploy to Server

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: |
            GITHUB_SHA,GITHUB_RUN_NUMBER,GITHUB_REF_NAME
          script: |
            cd /home/ubuntu/academy-notice-board
            git pull origin main
            npm install --production
            pm2 delete academy-notice-board 2>/dev/null
            DEPLOY_VERSION="${GITHUB_SHA:0:7}" DEPLOY_DATE="$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S')" pm2 start ecosystem.config.js --update-env
