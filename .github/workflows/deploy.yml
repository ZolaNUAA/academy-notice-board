name: Deploy to Server

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Deploy via rsync
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SERVER_PORT }} -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='data/uploads' \
            --exclude='data/notices.json' \
            --exclude='data/config.json' \
            --exclude='data/operation.log' \
            --exclude='data/backups' \
            --exclude='.deploy-exclude' \
            -e "ssh -p ${{ secrets.SERVER_PORT }}" \
            ./ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/ubuntu/academy-notice-board/

      - name: Restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: |
            GITHUB_SHA,GITHUB_RUN_NUMBER,GITHUB_REF_NAME
          script: |
            cd /home/ubuntu/academy-notice-board
            npm install --production
            pm2 delete academy-notice-board 2>/dev/null
            DEPLOY_VERSION="${GITHUB_SHA:0:7}" DEPLOY_DATE="$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S')" pm2 start ecosystem.config.js --update-env
